apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node
          image: e-commerce-backend:latest
          imagePullPolicy: Never # <-- Add this line
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
